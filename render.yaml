services:
  - type: web
    name: mapdal-seoul
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mapdal-db
          property: connectionString
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true

databases:
  - name: mapdal-db
    plan: basic-1gb
